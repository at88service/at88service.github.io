<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Admin | Dashboard</title>
    <style>
        :root { --blue: #2563eb; --red: #dc2626; --navy: #0f172a; --bg: #f1f5f9; --white: #ffffff; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; }
        .header { background: var(--navy); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; }
        .card { background: var(--white); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; border-top: 4px solid var(--blue); }
        .form-input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        .btn-red { background: var(--red); color: white; }
        .manage-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .preview-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-form" style="max-width: 400px; margin: 100px auto;" class="card">
        <h2 style="text-align:center">88 <span style="color:var(--red)">ADMIN</span></h2>
        <input type="email" id="email" placeholder="Email" class="form-input">
        <input type="password" id="pass" placeholder="Password" class="form-input">
        <button id="loginBtn" class="btn btn-blue">Login</button>
    </div>

    <div id="panel" class="hidden">
        <header class="header">
            <h1 style="margin:0">88 ADMIN</h1>
            <button id="logoutBtn" class="btn btn-red">Logout</button>
        </header>
        <div class="container grid">
            <div class="col">
                <div class="card">
                    <h3>About Text</h3>
                    <textarea id="about-edit" class="form-input" style="height:100px"></textarea>
                    <button id="save-about" class="btn btn-blue">Update About</button>
                </div>
                <div class="card">
                    <h3>New Image Link</h3>
                    <input type="text" id="g-title" placeholder="Title" class="form-input">
                    <input type="text" id="g-url" placeholder="Image URL" class="form-input">
                    <textarea id="g-desc" placeholder="Description" class="form-input"></textarea>
                    <label><input type="checkbox" id="g-hero"> Add to Slider</label>
                    <button id="add-gallery" class="btn btn-blue" style="margin-top:10px">Post Image</button>
                </div>
            </div>
            <div class="col">
                <div class="card">
                    <h3>Live Content</h3>
                    <div id="live-list"></div>
                </div>
                <div class="card">
                    <h3>Inquiries</h3>
                    <div id="inquiry-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, addDoc, collection, query, orderBy, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
            authDomain: "service-6327f.firebaseapp.com",
            projectId: "service-6327f",
            storageBucket: "service-6327f.firebasestorage.app",
            messagingSenderId: "331161362655",
            appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('panel').classList.remove('hidden');
                document.getElementById('login-form').classList.add('hidden');
                loadData();
            } else {
                document.getElementById('panel').classList.add('hidden');
                document.getElementById('login-form').classList.remove('hidden');
            }
        });

        function loadData() {
            onSnapshot(doc(db, "content", "about"), d => { if(d.exists()) document.getElementById('about-edit').value = d.data().text; });
            
            onSnapshot(query(collection(db, "gallery"), orderBy("timestamp", "desc")), s => {
                const list = document.getElementById('live-list');
                list.innerHTML = '';
                s.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="manage-item">
                        <img src="${data.url}" class="preview-img">
                        <span>${data.title}</span>
                        <button class="btn btn-red" onclick="window.del('${d.id}')">Del</button>
                    </div>`;
                });
            });

            onSnapshot(query(collection(db, "inquiries"), orderBy("timestamp", "desc")), s => {
                const list = document.getElementById('inquiry-list');
                list.innerHTML = '';
                s.forEach(d => {
                    list.innerHTML += `<div class="manage-item">
                        <div><strong>${d.data().name}</strong>: ${d.data().message}</div>
                        <button class="btn btn-red" onclick="window.delInq('${d.id}')">X</button>
                    </div>`;
                });
            });
        }

        window.del = id => deleteDoc(doc(db, "gallery", id));
        window.delInq = id => deleteDoc(doc(db, "inquiries", id));

        document.getElementById('save-about').onclick = () => setDoc(doc(db, "content", "about"), { text: document.getElementById('about-edit').value });
        
        document.getElementById('add-gallery').onclick = async () => {
            await addDoc(collection(db, "gallery"), {
                title: document.getElementById('g-title').value,
                url: document.getElementById('g-url').value,
                description: document.getElementById('g-desc').value,
                isHero: document.getElementById('g-hero').checked,
                timestamp: Date.now()
            });
            alert("Posted!");
        };
    </script>
</body>
</html>
