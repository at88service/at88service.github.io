<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Admin | Control Center</title>
    <style>
        :root {
            --blue: #2563eb;
            --red: #dc2626;
            --navy: #0f172a;
            --bg: #f8fafc;
            --white: #ffffff;
            --slate-600: #475569;
            --slate-400: #94a3b8;
        }

        body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 20px; color: var(--navy); }
        .hidden { display: none !important; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Card Styling */
        .card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid var(--blue); }
        .card-red { border-top-color: var(--red); }

        /* Inputs & Buttons */
        .form-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; outline: none; }
        .form-input:focus { border-color: var(--blue); }
        .btn { background: var(--blue); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-red { background: var(--red); }

        /* Layout Grid */
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        /* Inquiry & Gallery Items */
        .list-item { padding: 15px; background: #f1f5f9; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid var(--blue); display: flex; gap: 15px; align-items: flex-start; }
        .inquiry-item { border-left-color: var(--red); flex-direction: column; }
        .inquiry-meta { display: flex; justify-content: space-between; width: 100%; font-weight: bold; margin-bottom: 5px; }
        .img-preview-small { width: 60px; height: 60px; border-radius: 8px; background: #cbd5e1; object-fit: cover; flex-shrink: 0; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-weight: 900; font-size: 1.8rem; background: linear-gradient(135deg, var(--blue), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <div id="login-form" class="card" style="max-width: 400px; margin: 100px auto;">
        <div class="logo" style="text-align: center; margin-bottom: 20px;">88 ADMIN</div>
        <input type="email" id="email" placeholder="Admin Email" class="form-input">
        <input type="password" id="pass" placeholder="Password" class="form-input">
        <button id="loginBtn" class="btn">Login to Panel</button>
    </div>

    <div id="panel" class="hidden container">
        <header>
            <div class="logo">88 SERVICE</div>
            <div>
                <button onclick="localStorage.removeItem('gh_token'); location.reload();" class="btn" style="width:auto; margin-right:10px; background:#64748b">Reset Token</button>
                <button id="logoutBtn" class="btn btn-red" style="width: auto;">Logout</button>
            </div>
        </header>

        <div class="grid">
            <div class="col">
                <div class="card">
                    <h3>Company Profile (About)</h3>
                    <textarea id="about-edit" class="form-input" style="height: 100px;" placeholder="Update the main 'The 88 Standard' text..."></textarea>
                    <button id="save-about" class="btn">Update Site Text</button>
                </div>

                <div class="card">
                    <h3>Add Gallery Project</h3>
                    <input type="text" id="g-title" placeholder="Project Title" class="form-input">
                    <textarea id="g-desc" placeholder="Project Description" class="form-input"></textarea>
                    <input type="file" id="g-file" class="form-input" accept="image/*">
                    <button id="add-gallery" class="btn">Commit to GitHub Repository</button>
                </div>
            </div>

            <div class="col">
                <div class="card card-red">
                    <h3>Client Inquiries</h3>
                    <div id="inquiry-list" style="max-height: 400px; overflow-y: auto;"></div>
                </div>
                
                <div class="card">
                    <h3>Active Gallery</h3>
                    <div id="admin-gallery-list" style="max-height: 400px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
            authDomain: "service-6327f.firebaseapp.com",
            projectId: "service-6327f",
            storageBucket: "service-6327f.firebasestorage.app",
            messagingSenderId: "331161362655",
            appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
        };

        const GITHUB_USER = "at88service";
        const GITHUB_REPO = "at88service.github.io";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH & TOKEN ---
        document.getElementById('loginBtn').onclick = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            document.getElementById('panel').classList.toggle('hidden', !user);
            document.getElementById('login-form').classList.toggle('hidden', !!user);
            if(user) {
                if(!localStorage.getItem('gh_token')) {
                    const t = prompt("Security: Enter GitHub Personal Access Token (PAT):");
                    if(t) localStorage.setItem('gh_token', t);
                }
                loadDashboardData();
            }
        });

        // --- LOAD DASHBOARD ---
        function loadDashboardData() {
            // Load About
            onSnapshot(doc(db, "content", "about"), d => { if(d.exists()) document.getElementById('about-edit').value = d.data().text; });
            
            // Load Inquiries with Email Display
            onSnapshot(query(collection(db, "inquiries"), orderBy("timestamp", "desc")), s => {
                const list = document.getElementById('inquiry-list');
                list.innerHTML = '';
                s.forEach(d => {
                    const data = d.data();
                    const time = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'Just now';
                    list.innerHTML += `
                        <div class="list-item inquiry-item">
                            <div class="inquiry-meta">
                                <span>${data.name}</span>
                                <span style="color:var(--blue); font-weight:normal;">${data.email || ''}</span>
                            </div>
                            <div style="font-size:0.9rem; color:var(--slate-600); margin:5px 0;">${data.message}</div>
                            <div style="font-size:0.7rem; color:var(--slate-400); text-align:right;">${time}</div>
                        </div>`;
                });
            });

            // Load Gallery Items
            onSnapshot(query(collection(db, "gallery"), orderBy("timestamp", "desc")), s => {
                const list = document.getElementById('admin-gallery-list');
                list.innerHTML = '';
                s.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `
                        <div class="list-item">
                            <img src="${data.url}" class="img-preview-small" onerror="this.src='https://placehold.co/60x60?text=Wait'">
                            <div><strong>${data.title}</strong></div>
                        </div>`;
                });
            });
        }

        // --- ACTIONS ---
        document.getElementById('save-about').onclick = async () => {
            await setDoc(doc(db, "content", "about"), { text: document.getElementById('about-edit').value });
            alert("Site Profile Updated!");
        };

        document.getElementById('add-gallery').onclick = async () => {
            const token = localStorage.getItem('gh_token');
            const file = document.getElementById('g-file').files[0];
            const title = document.getElementById('g-title').value;
            
            if(!token || !file || !title) return alert("Fill all project details and ensure Token is provided.");

            const btn = document.getElementById('add-gallery');
            btn.innerText = "Pushing to GitHub...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                const fileName = Date.now() + "_" + file.name.replace(/\s/g, '_');

                try {
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/images/${fileName}`, {
                        method: "PUT",
                        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ message: `Gallery Upload: ${title}`, content: base64Content })
                    });

                    if(!res.ok) throw new Error("GitHub rejected the request. Please check your Token permissions.");

                    await addDoc(collection(db, "gallery"), {
                        title: title,
                        description: document.getElementById('g-desc').value,
                        url: `images/${fileName}`,
                        timestamp: Date.now()
                    });

                    alert("Project Live! Image will be visible on site shortly.");
                    location.reload();
                } catch(err) { 
                    alert(err.message); 
                    btn.innerText = "Commit to GitHub Repository"; 
                }
            };
        };
    </script>
</body>
</html>
