<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Service | Admin Panel</title>
    <style>
        :root {
            --bg-navy: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --red-600: #dc2626;
            --white: #ffffff;
        }
        body { background: var(--bg-navy); color: var(--white); font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        /* Form & Input Styles */
        .card { background: var(--slate-800); padding: 2rem; border-radius: 1rem; border: 1px solid rgba(220, 38, 38, 0.2); margin-bottom: 2rem; }
        .form-input { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: 1px solid var(--slate-700); background: var(--bg-navy); color: white; box-sizing: border-box;
        }
        .btn-red { 
            background: var(--red-600); color: white; padding: 12px 24px; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        .btn-red:hover { opacity: 0.8; }
        
        /* Layout */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        /* Inquiry List */
        .inquiry-card { 
            background: var(--slate-700); padding: 15px; border-radius: 10px; 
            border-left: 4px solid var(--red-600); margin-bottom: 10px; 
        }
        .inquiry-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: #cbd5e1; margin-bottom: 5px; }
        .red-text { color: var(--red-600); }
    </style>
</head>
<body>

    <div id="login-form" class="card" style="max-width: 400px; margin: 100px auto;">
        <h2 style="text-align: center;">88 <span class="red-text">Admin</span></h2>
        <input type="email" id="email" placeholder="Email" class="form-input">
        <input type="password" id="pass" placeholder="Password" class="form-input">
        <button onclick="login()" class="btn-red">Login</button>
    </div>

    <div id="panel" class="hidden container">
        <header>
            <h1>Control <span class="red-text">88</span></h1>
            <button onclick="logout()" style="background:none; border:none; color:#94a3b8; cursor:pointer;">Logout</button>
        </header>

        <div class="grid">
            <div class="left-col">
                <div class="card">
                    <h3 style="font-size: 12px; text-transform: uppercase; color: #60a5fa;">Company Info</h3>
                    <textarea id="about-input" class="form-input" style="height: 100px;" placeholder="Update company about info..."></textarea>
                    <button id="save-about" class="btn-red" style="width: auto;">Update About</button>
                </div>

                <div class="card">
                    <h3 style="font-size: 12px; text-transform: uppercase; color: #60a5fa;">Add Gallery Item</h3>
                    <input type="text" id="g-title" placeholder="Project Title" class="form-input">
                    <input type="text" id="g-url" placeholder="Direct Image URL" class="form-input">
                    <textarea id="g-desc" placeholder="Project Description" class="form-input" style="height: 80px;"></textarea>
                    <button id="add-item" class="btn-red">Post to Gallery</button>
                </div>
            </div>

            <div class="card">
                <h3 style="font-size: 12px; text-transform: uppercase; color: var(--red-600);">Client Requests</h3>
                <div id="inquiry-list" style="max-height: 500px; overflow-y: auto;">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, addDoc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
            authDomain: "service-6327f.firebaseapp.com",
            projectId: "service-6327f",
            storageBucket: "service-6327f.firebasestorage.app",
            messagingSenderId: "331161362655",
            appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global functions for buttons
        window.login = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };
        window.logout = () => signOut(auth);

        // Auth State Toggle
        onAuthStateChanged(auth, user => {
            const p = document.getElementById('panel'), l = document.getElementById('login-form');
            if(user) { p.classList.remove('hidden'); l.classList.add('hidden'); }
            else { p.classList.add('hidden'); l.classList.remove('hidden'); }
        });

        // Update About
        document.getElementById('save-about').onclick = async () => {
            const text = document.getElementById('about-input').value;
            try {
                await setDoc(doc(db, "content", "about"), { text });
                alert("About Info Updated!");
            } catch(e) { alert("Error: No permission"); }
        };

        // Add Gallery Item
        document.getElementById('add-item').onclick = async () => {
            try {
                await addDoc(collection(db, "gallery"), { 
                    title: document.getElementById('g-title').value, 
                    url: document.getElementById('g-url').value, 
                    description: document.getElementById('g-desc').value,
                    timestamp: Date.now()
                });
                alert("Gallery Item Added!");
                document.getElementById('g-title').value = '';
                document.getElementById('g-url').value = '';
                document.getElementById('g-desc').value = '';
            } catch(e) { alert("Error: No permission"); }
        };

        // Real-time Inquiries
        const q = query(collection(db, "inquiries"), orderBy("timestamp", "desc"));
        onSnapshot(q, s => {
            const list = document.getElementById('inquiry-list');
            list.innerHTML = '';
            s.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                <div class="inquiry-card">
                    <div class="inquiry-meta"><strong>${data.name || 'Anonymous'}</strong><span>${data.email || ''}</span></div>
                    <p style="margin:0; font-size:0.9rem;">${data.message || 'No message'}</p>
                </div>`;
            });
        });
    </script>
</body>
</html>
