<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>88 Admin | Control Panel</title>
    <style>
        :root { --blue: #2563eb; --red: #dc2626; --bg: #0f172a; --card: #ffffff; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 40px; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); max-width: 800px; margin: 0 auto 30px; border-top: 6px solid var(--blue); }
        .input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-red { background: var(--red); }
        .hidden { display: none; }
        .inquiry-item { padding: 15px; border-bottom: 1px solid #eee; color: #334155; }
    </style>
</head>
<body>

    <div id="login-form" class="card" style="max-width: 400px; margin-top: 100px;">
        <h2 style="text-align: center; margin-top: 0;">88 <span style="color:var(--red)">Admin</span></h2>
        <input type="email" id="email" placeholder="Email" class="input">
        <input type="password" id="pass" placeholder="Password" class="input">
        <button id="loginBtn" class="btn">Login</button>
    </div>

    <div id="panel" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h2 style="margin:0;">Dashboard</h2>
                <button id="logoutBtn" class="btn btn-red" style="width:auto">Logout</button>
            </div>
            <label>Update About Us Text</label>
            <textarea id="about-edit" class="input" style="height: 120px;"></textarea>
            <button id="save-about" class="btn">Update Company Profile</button>
        </div>

        <div class="card" style="border-top-color: var(--red);">
            <h2>Add New Project</h2>
            <input type="text" id="g-title" placeholder="Project Name" class="input">
            <input type="text" id="g-filename" placeholder="Filename (e.g. project1.jpg)" class="input">
            <textarea id="g-desc" placeholder="Project Description" class="input" style="height: 80px;"></textarea>
            <button id="add-gallery" class="btn btn-red">Post to Website</button>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 10px;">Note: You must manually upload the image to your <b>/images</b> folder in GitHub.</p>
        </div>

        <div class="card">
            <h2 style="color: var(--red)">Recent Client Inquiries</h2>
            <div id="inquiry-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, addDoc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
            authDomain: "service-6327f.firebaseapp.com",
            projectId: "service-6327f",
            storageBucket: "service-6327f.firebasestorage.app",
            messagingSenderId: "331161362655",
            appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth
        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            document.getElementById('panel').classList.toggle('hidden', !user);
            document.getElementById('login-form').classList.toggle('hidden', !!user);
            if(user) {
                onSnapshot(doc(db, "content", "about"), (d) => { if(d.exists()) document.getElementById('about-edit').value = d.data().text; });
                const q = query(collection(db, "inquiries"), orderBy("timestamp", "desc"));
                onSnapshot(q, s => {
                    const list = document.getElementById('inquiry-list');
                    list.innerHTML = '';
                    s.forEach(d => { list.innerHTML += `<div class="inquiry-item"><strong>${d.data().name}</strong>: ${d.data().message}</div>`; });
                });
            }
        });

        // Save Data
        document.getElementById('save-about').onclick = async () => {
            await setDoc(doc(db, "content", "about"), { text: document.getElementById('about-edit').value });
            alert("Updated!");
        };

        document.getElementById('add-gallery').onclick = async () => {
            const file = document.getElementById('g-filename').value;
            await addDoc(collection(db, "gallery"), {
                title: document.getElementById('g-title').value,
                url: `images/${file}`,
                description: document.getElementById('g-desc').value,
                timestamp: Date.now()
            });
            alert("Saved! Now upload " + file + " to your GitHub /images folder.");
        };
    </script>
</body>
</html>
