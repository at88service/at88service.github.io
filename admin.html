<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Service | Admin Panel</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --red: #dc2626; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); padding: 2rem; border-radius: 1rem; border: 1px solid rgba(220,38,38,0.2); margin-bottom: 2rem; }
        .form-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: var(--bg); color: white; box-sizing: border-box; }
        .btn-red { background: var(--red); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1100px; margin: 0 auto; }
        .inquiry-card { background: #334155; padding: 15px; border-radius: 10px; border-left: 4px solid var(--red); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-form" class="card" style="max-width: 400px; margin: 100px auto;">
        <h2 style="text-align: center;">88 Admin</h2>
        <input type="email" id="email" placeholder="Email" class="form-input">
        <input type="password" id="pass" placeholder="Password" class="form-input">
        <button id="loginBtn" class="btn-red">Login</button>
    </div>

    <div id="panel" class="hidden">
        <header style="display:flex; justify-content: space-between; max-width:1100px; margin: 0 auto 40px;">
            <h1>Control <span style="color:var(--red)">88</span></h1>
            <button id="logoutBtn" style="color:#94a3b8; background:none; border:none; cursor:pointer;">Logout</button>
        </header>

        <div class="grid">
            <div>
                <div class="card">
                    <h3>Add Gallery Item</h3>
                    <input type="text" id="g-title" placeholder="Project Title" class="form-input">
                    <input type="text" id="g-url" placeholder="Image Filename (e.g. photo1.jpg)" class="form-input">
                    <textarea id="g-desc" placeholder="Description" class="form-input" style="height:80px"></textarea>
                    <button id="add-item" class="btn-red">Post to Gallery</button>
                </div>
            </div>
            <div class="card">
                <h3 style="color:var(--red)">Client Requests</h3>
                <div id="inquiry-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
            authDomain: "service-6327f.firebaseapp.com",
            projectId: "service-6327f",
            storageBucket: "service-6327f.firebasestorage.app",
            messagingSenderId: "331161362655",
            appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth Logic
        document.getElementById('loginBtn').onclick = () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login Failed: " + err.message));
        };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            document.getElementById('panel').classList.toggle('hidden', !user);
            document.getElementById('login-form').classList.toggle('hidden', !!user);
        });

        // Add Gallery (Local Path)
        document.getElementById('add-item').onclick = async () => {
            const fileName = document.getElementById('g-url').value;
            try {
                await addDoc(collection(db, "gallery"), {
                    title: document.getElementById('g-title').value,
                    url: `/images/${fileName}`, // Points to your local /images folder
                    description: document.getElementById('g-desc').value,
                    timestamp: Date.now()
                });
                alert("Posted! Place " + fileName + " in your public/images folder.");
            } catch(e) { alert("Permission Denied"); }
        };

        // Load Inquiries
        const q = query(collection(db, "inquiries"), orderBy("timestamp", "desc"));
        onSnapshot(q, s => {
            const list = document.getElementById('inquiry-list');
            list.innerHTML = '';
            s.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="inquiry-card">
                    <p><strong>${data.name}</strong> (${data.email})</p>
                    <p style="font-size:0.9rem">${data.message}</p>
                </div>`;
            });
        });
    </script>
</body>
</html>
