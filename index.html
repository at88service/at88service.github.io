<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Service | Premium Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/path/to/your/icon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="fixed w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="logo-88">88</div>
            <div class="hidden md:flex space-x-10 font-bold uppercase text-xs tracking-widest">
                <a href="#about" class="hover:text-red-600 transition">About</a>
                <a href="#gallery" class="hover:text-red-600 transition">Gallery</a>
                <a href="#contact" class="hover:text-red-600 transition">Contact</a>
            </div>
        </div>
    </nav>

    <section class="h-screen flex items-center px-6 hero-gradient text-white relative">
        <div class="max-w-7xl mx-auto z-10">
            <h1 class="hero-title animate-slide">88 <span class="text-red-600">SERVICE</span></h1>
            <p class="text-xl text-slate-300 max-w-xl accent-border mt-8">Excellence redefined through precision and creative execution.</p>
        </div>
    </section>

    <section id="about" class="py-32 px-6 max-w-7xl mx-auto">
        <div class="grid md:grid-cols-2 gap-20 items-center">
            <div>
                <span class="text-red-600 font-bold tracking-widest uppercase">Company Profile</span>
                <h2 class="text-5xl font-bold mt-4 mb-8">The 88 Standard</h2>
                <p id="about-text" class="text-lg text-slate-600 leading-relaxed">Loading brand information...</p>
            </div>
            <div class="w-full h-80 bg-navy rounded-3xl overflow-hidden shadow-2xl relative">
                <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800" class="w-full h-full object-cover opacity-80">
            </div>
        </div>
    </section>

    <section id="gallery" class="py-32 bg-slate-100">
        <div class="max-w-7xl mx-auto px-6">
            <div id="gallery-list" class="space-y-32">
                </div>
        </div>
    </section>

    <section id="contact" class="py-32 bg-navy text-white">
        <div class="max-w-3xl mx-auto px-6">
            <div class="bg-white/5 p-12 rounded-3xl border border-white/10 shadow-2xl">
                <h2 class="text-4xl font-bold mb-8 text-center">Contact <span class="text-red-600">88</span></h2>
                <form id="contactForm" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <input type="text" id="custName" placeholder="Full Name" class="form-input" required>
                        <input type="email" id="custEmail" placeholder="Email Address" class="form-input" required>
                    </div>
                    <textarea id="custMsg" rows="5" placeholder="Your Message" class="form-input" required></textarea>
                    <button type="submit" class="btn-red w-full">Submit Request</button>
                </form>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

     const firebaseConfig = {
        apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
        authDomain: "service-6327f.firebaseapp.com",
        projectId: "service-6327f", // Make sure this is NOT "88web"
        storageBucket: "service-6327f.firebasestorage.app", // Fixed the 't' typo here
        messagingSenderId: "331161362655",
        appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a",
        measurementId: "G-ESBERML5HJ"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch About
        onSnapshot(doc(db, "content", "about"), (d) => {
            if(d.exists()) document.getElementById('about-text').innerText = d.data().text;
        });

        // Fetch Gallery (Sorted by newest)
        const gQuery = query(collection(db, "gallery"), orderBy("timestamp", "desc"));
        onSnapshot(gQuery, (snap) => {
            const list = document.getElementById('gallery-list');
            list.innerHTML = '';
            snap.docs.forEach((d, i) => {
                const item = d.data();
                const isEven = i % 2 === 0;
                list.innerHTML += `
                    <div class="gallery-block ${isEven ? 'md:flex-row' : 'md:flex-row-reverse'} items-center gap-12">
                        <div class="flex-1 gallery-img-wrapper overflow-hidden rounded-2xl shadow-lg">
                            <img src="${item.url}" class="w-full h-[450px] object-cover transition duration-700 hover:scale-110">
                        </div>
                        <div class="flex-1 px-4">
                            <h3 class="text-4xl font-bold mb-6">${item.title}</h3>
                            <p class="text-slate-500 text-lg leading-relaxed">${item.description}</p>
                        </div>
                    </div>`;
            });
        });

        // Send Message
        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "inquiries"), {
                    name: document.getElementById('custName').value,
                    email: document.getElementById('custEmail').value,
                    message: document.getElementById('custMsg').value,
                    timestamp: serverTimestamp()
                });
                alert("Message sent to 88 Service!");
                e.target.reset();
            } catch (err) {
                alert("Error sending message.");
            }
        };
    </script>
</body>
</html>
