<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Service | Premium</title>
    <style>
        :root { --navy: #0f172a; --red: #dc2626; --slate-50: #f8fafc; }
        body { background: var(--slate-50); margin: 0; font-family: sans-serif; }
        nav { position: fixed; width: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 1rem; z-index: 10; }
        .hero { height: 100vh; background: var(--navy); color: white; display: flex; align-items: center; justify-content: center; text-align: center; }
        .gallery-block { display: flex; align-items: center; gap: 4rem; padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        .gallery-block.reverse { flex-direction: row-reverse; }
        .gallery-img { flex: 1; border-radius: 20px; overflow: hidden; height: 400px; }
        .gallery-img img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-text { flex: 1; }
        .contact { background: var(--navy); color: white; padding: 4rem 2rem; border-radius: 40px; margin: 2rem; }
    </style>
</head>
<body>

    <nav><div style="max-width:1200px; margin:0 auto; font-weight:900; font-size:1.5rem;">88</div></nav>

    <div class="hero">
        <div><h1 style="font-size:5rem; margin:0;">88 SERVICE</h1></div>
    </div>

    <div id="gallery-list"></div>

    <div class="contact" id="contact">
        <form id="contactForm" style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem;">
            <input type="text" id="custName" placeholder="Name" style="padding:1rem; border-radius:10px; border:none;" required>
            <input type="email" id="custEmail" placeholder="Email" style="padding:1rem; border-radius:10px; border:none;" required>
            <textarea id="custMsg" placeholder="Message" style="padding:1rem; border-radius:10px; border:none; height:100px;" required></textarea>
            <button type="submit" style="background:var(--red); color:white; padding:1rem; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Send</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
            authDomain: "service-6327f.firebaseapp.com",
            projectId: "service-6327f",
            storageBucket: "service-6327f.firebasestorage.app",
            messagingSenderId: "331161362655",
            appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Gallery
        const q = query(collection(db, "gallery"), orderBy("timestamp", "desc"));
        onSnapshot(q, snap => {
            const list = document.getElementById('gallery-list');
            list.innerHTML = '';
            snap.docs.forEach((d, i) => {
                const item = d.data();
                const rev = i % 2 !== 0 ? 'reverse' : '';
                list.innerHTML += `<div class="gallery-block ${rev}">
                    <div class="gallery-img"><img src="${item.url}"></div>
                    <div class="gallery-text"><h2>${item.title}</h2><p>${item.description}</p></div>
                </div>`;
            });
        }, err => console.log("Check Firestore Rules: ", err));

        // Submit Inquiry
        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "inquiries"), {
                name: document.getElementById('custName').value,
                email: document.getElementById('custEmail').value,
                message: document.getElementById('custMsg').value,
                timestamp: serverTimestamp()
            });
            alert("Sent!");
            e.target.reset();
        };
    </script>
</body>
</html>
