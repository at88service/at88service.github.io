<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Service | Premium Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <nav class="glass-nav">
    <div class="nav-inner">
        <div class="logo-88">88</div>
        <div class="nav-links">
            <a href="#main-slider" class="nav-item">Home</a>
            <a href="#about" class="nav-item">About</a>
            <a href="#gallery" class="nav-item">Gallery</a>
            <a href="#contactForm" class="nav-item">Contact</a>
        </div>
    </div>
</nav>

    <header class="hero-slider">
        <div class="slider-track" id="main-slider"></div>
    </header>

    <section id="about" class="section">
        <span class="section-tag">Since 2026</span>
        <h2 style="font-size: 3rem; margin: 1rem 0;">The 88 Standard</h2>
        <p id="about-text" style="font-size: 1.2rem; line-height: 1.8; border-left: 4px solid var(--red); padding-left: 2rem;">Loading...</p>
    </section>

    <section id="gallery" class="section" style="background: #f1f5f9; max-width: 100%;">
        <div id="gallery-list" style="max-width:1200px; margin:0 auto;"></div>
    </section>

    <section class="section">
        <div class="bg-navy">
            <div class="contact-container">
                <h2 style="text-align: center; font-size: 3rem; margin-bottom: 2rem;">START A PROJECT <span style="color:var(--red)">88</span></h2>
                <form id="contactForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <input type="text" id="custName" placeholder="Name" class="form-input" required maxlength="50">
                        <input type="email" id="custEmail" placeholder="Email" class="form-input" required>
                    </div>
                    <textarea id="custMsg" rows="5" placeholder="Project details..." class="form-input" required maxlength="500"></textarea>
                    <button type="submit" id="sendBtn" class="btn-red">SEND REQUEST</button>
                </form>
            </div>
        </div>
    </section>
    
    <footer class="main-footer">
        <div class="footer-inner">
            <div class="footer-top">
                <div class="footer-brand">
                    <div class="logo-88">88</div>
                    <p>Elevating standards since 2026. Premium solutions for ambitious projects.</p>
                </div>

                <div class="footer-contact">
                    <h4>Connect</h4>
                    <a href="tel:+37120000000" class="phone-link">+371 20 000 000</a>
                    <div class="social-icons">
                        <a href="#" aria-label="Instagram">Instagram</a>
                        <a href="#" aria-label="Facebook">Facebook</a>
                        <a href="#" aria-label="LinkedIn">LinkedIn</a>
                    </div>
                </div>
            </div>

            <div class="footer-bottom">
                <p>&copy; 2026 88 Service. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
            authDomain: "service-6327f.firebaseapp.com",
            projectId: "service-6327f",
            storageBucket: "service-6327f.firebasestorage.app",
            messagingSenderId: "331161362655",
            appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch About
        onSnapshot(doc(db, "content", "about"), d => { if(d.exists()) document.getElementById('about-text').innerText = d.data().text; });

        // Fetch Gallery & Slider
        onSnapshot(query(collection(db, "gallery"), orderBy("timestamp", "desc")), snap => {
            const gList = document.getElementById('gallery-list');
            const sTrack = document.getElementById('main-slider');
            gList.innerHTML = ''; sTrack.innerHTML = '';
            
            let hCount = 0;
            snap.docs.forEach((d, i) => {
                const item = d.data();
                if(item.isHero && hCount < 3) {
                    sTrack.innerHTML += `<div class="slide" style="background-image:url('${item.url}')"><div class="slide-overlay"><div class="hero-text"><h1>${item.title.toUpperCase()}</h1></div></div></div>`;
                    hCount++;
                }
                const rev = i % 2 !== 0 ? 'reverse' : '';
                gList.innerHTML += `<div class="gallery-block ${rev}"><div class="gallery-img-wrapper"><img src="${item.url}"></div><div class="gallery-text"><h3>${item.title}</h3><p>${item.description}</p></div></div>`;
            });
            sTrack.style.width = (hCount * 100) + "%";
            sTrack.querySelectorAll('.slide').forEach(s => s.style.width = (100 / hCount) + "%");
        });

        // Anti-Spam Submission
        let lastSent = 0;
        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            if(Date.now() - lastSent < 60000) return alert("Please wait 1 minute.");
            
            try {
                await addDoc(collection(db, "inquiries"), {
                    name: document.getElementById('custName').value,
                    email: document.getElementById('custEmail').value,
                    message: document.getElementById('custMsg').value,
                    timestamp: serverTimestamp()
                });
                lastSent = Date.now();
                alert("Sent!");
                e.target.reset();
            } catch (e) { alert("Error."); }
        };
    </script>
</body>
</html>
