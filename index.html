<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Service | Premium Solutions</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .lang-switch { display: flex; gap: 10px; margin-left: 20px; align-items: center; }
        .lang-btn { 
            background: none; border: 1px solid rgba(0,0,0,0.2); 
            color: #000; cursor: pointer; padding: 4px 10px; font-size: 0.75rem;
            border-radius: 4px; transition: 0.3s; font-weight: bold;
        }
        .lang-btn.active { background: var(--red, #dc2626); border-color: var(--red, #dc2626); color: white; }
        /* Ensure slider is visible */
        .hero-slider { overflow: hidden; width: 100%; height: 80vh; background: #000; }
        .slider-track { display: flex; height: 100%; transition: transform 0.5s ease; }
        .slide { flex-shrink: 0; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
        .hero-text h1 { color: white; font-size: 4rem; text-align: center; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-inner">
        <div class="logo-88">88</div>
        <div class="nav-links">
            <a href="#main-slider" class="nav-item" data-i18n="nav_home">Home</a>
            <a href="#about" class="nav-item" data-i18n="nav_about">About</a>
            <a href="#gallery" class="nav-item" data-i18n="nav_gallery">Gallery</a>
            <a href="#contactForm" class="nav-item" data-i18n="nav_contact">Contact</a>
            <div class="lang-switch">
                <button class="lang-btn active" onclick="changeLang('en')">EN</button>
                <button class="lang-btn" onclick="changeLang('lv')">LV</button>
                <button class="lang-btn" onclick="changeLang('ru')">RU</button>
            </div>
        </div>
    </div>
</nav>

<header class="hero-slider">
    <div class="slider-track" id="main-slider"></div>
</header>

<section id="about" class="section">
    <span class="section-tag" data-i18n="since">Since 2026</span>
    <h2 style="font-size: 3rem; margin: 1rem 0;" data-i18n="about_title">The 88 Standard</h2>
    <p id="about-text" style="font-size: 1.2rem; line-height: 1.8; border-left: 4px solid var(--red); padding-left: 2rem;">Loading content...</p>
</section>

<section id="gallery" class="section" style="background: #f1f5f9; max-width: 100%;">
    <div id="gallery-list" style="max-width:1200px; margin:0 auto;"></div>
</section>

<section class="section">
    <div class="bg-navy">
        <div class="contact-container">
            <h2 style="text-align: center; font-size: 3rem; margin-bottom: 2rem;"><span data-i18n="form_title">START A PROJECT</span> <span style="color:var(--red)">88</span></h2>
            <form id="contactForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <input type="text" id="custName" placeholder="Name" class="form-input" required>
                    <input type="email" id="custEmail" placeholder="Email" class="form-input" required>
                </div>
                <textarea id="custMsg" rows="5" placeholder="Project details..." class="form-input" required></textarea>
                <button type="submit" id="sendBtn" class="btn-red" data-i18n="form_btn">SEND REQUEST</button>
            </form>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-inner">
            <div class="footer-top">
                <div class="footer-brand">
                    <div class="logo-88">88</div>
                    <p data-i18n="footer_desc">Elevating standards since 2026. Premium solutions for ambitious projects.</p>
                </div>
                <div class="footer-contact">
                    <h4 data-i18n="footer_connect">Connect</h4>
                    <a href="tel:+37120000000" class="phone-link">+371 20 000 000</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 88 Service. <span data-i18n="footer_rights">All rights reserved.</span></p>
            </div>
        </div>
    </footer>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
        authDomain: "service-6327f.firebaseapp.com",
        projectId: "service-6327f",
        storageBucket: "service-6327f.firebasestorage.app",
        messagingSenderId: "331161362655",
        appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const translations = {
        en: {
            nav_home: "Home", nav_about: "About", nav_gallery: "Gallery", nav_contact: "Contact",
            since: "Since 2026", about_title: "The 88 Standard", form_title: "START A PROJECT",
            form_btn: "SEND REQUEST", footer_desc: "Elevating standards since 2026.",
            footer_connect: "Connect", footer_rights: "All rights reserved.",
            msg_wait: "Please wait 1 minute.", msg_sent: "Sent!", msg_err: "Error."
        },
        lv: {
            nav_home: "Sākums", nav_about: "Par mums", nav_gallery: "Galerija", nav_contact: "Kontakti",
            since: "Kopš 2026", about_title: "88 Standarts", form_title: "SĀKT PROJEKTU",
            form_btn: "SŪTĪT PIETEIKUMU", footer_desc: "Paaugstinām standartus kopš 2026. gada.",
            footer_connect: "Sazināties", footer_rights: "Visas tiesības aizsargātas.",
            msg_wait: "Lūdzu, uzgaidiet 1 minūti.", msg_sent: "Nosūtīts!", msg_err: "Kļūda."
        },
        ru: {
            nav_home: "Главная", nav_about: "О нас", nav_gallery: "Галерея", nav_contact: "Контакты",
            since: "С 2026 года", about_title: "Стандарт 88", form_title: "НАЧАТЬ ПРОЕКТ",
            form_btn: "ОТПРАВИТЬ ЗАПРОС", footer_desc: "Повышаем стандарты с 2026 года.",
            footer_connect: "Связаться", footer_rights: "Все права защищены.",
            msg_wait: "Пожалуйста, подождите 1 минуту.", msg_sent: "Отправлено!", msg_err: "Ошибка."
        }
    };

    let currentLang = 'en';
    let unsubAbout, unsubGallery;

    window.changeLang = (lang) => {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
        document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = translations[lang][el.getAttribute('data-i18n')]);
        fetchData();
    };

    function fetchData() {
        if(unsubAbout) unsubAbout();
        if(unsubGallery) unsubGallery();

        unsubAbout = onSnapshot(doc(db, "content", `about_${currentLang}`), d => {
            document.getElementById('about-text').innerText = d.exists() ? d.data().text : "Content loading...";
        });

        unsubGallery = onSnapshot(query(collection(db, `gallery_${currentLang}`), orderBy("timestamp", "desc")), snap => {
            const gList = document.getElementById('gallery-list');
            const sTrack = document.getElementById('main-slider');
            gList.innerHTML = ''; sTrack.innerHTML = '';
            
            let hCount = 0;
            snap.docs.forEach((d, i) => {
                const item = d.data();
                if(item.isHero && hCount < 3) {
                    sTrack.innerHTML += `<div class="slide" style="background-image:url('${item.url}')"><div class="slide-overlay"><div class="hero-text"><h1>${item.title.toUpperCase()}</h1></div></div></div>`;
                    hCount++;
                }
                const rev = i % 2 !== 0 ? 'reverse' : '';
                gList.innerHTML += `<div class="gallery-block ${rev}"><div class="gallery-img-wrapper"><img src="${item.url}"></div><div class="gallery-text"><h3>${item.title}</h3><p>${item.description}</p></div></div>`;
            });
            if(hCount > 0) {
                sTrack.style.width = (hCount * 100) + "%";
                sTrack.querySelectorAll('.slide').forEach(s => s.style.width = (100 / hCount) + "%");
            }
        });
    }

    let lastSent = 0;
    document.getElementById('contactForm').onsubmit = async (e) => {
        e.preventDefault();
        if(Date.now() - lastSent < 60000) return alert(translations[currentLang].msg_wait);
        try {
            await addDoc(collection(db, "inquiries"), {
                name: document.getElementById('custName').value,
                email: document.getElementById('custEmail').value,
                message: document.getElementById('custMsg').value,
                lang: currentLang,
                timestamp: serverTimestamp()
            });
            lastSent = Date.now();
            alert(translations[currentLang].msg_sent);
            e.target.reset();
        } catch (e) { alert(translations[currentLang].msg_err); }
    };

    fetchData();
</script>
</body>
</html>
