<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Service | Premium Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav-links" id="nav-links">
    <a href="#main-slider" class="nav-item" data-i18n="nav_home">Home</a>
    <a href="#about" class="nav-item" data-i18n="nav_about">About</a>
    
    <div class="dropdown">
        <a href="#gallery" class="nav-item" data-i18n="nav_gallery">Projects ▾</a>
        <div class="dropdown-content" id="nav-projects-list">
            </div>
    </div>

    <a href="#contactForm" class="nav-item" data-i18n="nav_contact">Contact</a>

    <div class="lang-switch">
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
        <button class="lang-btn" onclick="changeLang('lv')">LV</button>
        <button class="lang-btn" onclick="changeLang('ru')">RU</button>
    </div>
</div>

<header class="hero-slider">
    <div class="slider-track" id="main-slider"></div>
</header>

<section id="about" class="section">
    <span class="section-tag" data-i18n="since">Since 2026</span>
    <h2 class="section-title" data-i18n="about_title">The 88 Standard</h2>
    <p id="about-text" class="about-description">Loading...</p>
</section>

<section id="gallery" class="section-full bg-slate">
    <div id="gallery-list" class="container"></div>
</section>

<section id="contact" class="section">
    <div class="bg-navy">
        <div class="contact-container">
            <h2 class="form-title">
                <span data-i18n="form_title">START A PROJECT</span> <span class="text-red">88</span>
            </h2>
            <form id="contactForm">
                <div class="form-row">
                    <input type="text" id="custName" class="form-input" required>
                    <input type="email" id="custEmail" class="form-input" required>
                </div>
                <textarea id="custMsg" rows="5" class="form-input" required></textarea>
                <button type="submit" id="sendBtn" class="btn-red" data-i18n="form_btn">SEND REQUEST</button>
            </form>
        </div>
    </div>
</section>

<footer class="main-footer">
    <div class="footer-inner">
        <div class="footer-top">
            <div class="footer-brand">
                <div class="logo-container">
    <a href="#" class="logo-container">
        <img src="SERVISS88.png" alt="88 Serviss Logo" class="site-logo">
    </a>

                </div>
                <p data-i18n="footer_desc">Elevating standards since 2026. Premium solutions for ambitious projects.</p>
            </div>
            <div class="footer-contact">
                <h4 data-i18n="footer_connect">Connect</h4>
                <a href="tel:+37127666667" class="phone-link">+371 27666667</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 88 Service. <span data-i18n="footer_rights">All rights reserved.</span></p>
        </div>
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, query, orderBy, addDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
        authDomain: "service-6327f.firebaseapp.com",
        projectId: "service-6327f",
        storageBucket: "service-6327f.firebasestorage.app",
        messagingSenderId: "331161362655",
        appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentLang = 'en';
    let unsubGallery;

    // --- Navigation Logic ---
    window.showHome = () => {
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('project-view').style.display = 'none';
        window.scrollTo(0,0);
    };

    window.showProject = async (id) => {
        const d = await getDoc(doc(db, `gallery_${currentLang}`, id));
        if(!d.exists()) return;
        const item = d.data();

        document.getElementById('main-content').style.display = 'none';
        const pView = document.getElementById('project-view');
        pView.style.display = 'block';
        pView.innerHTML = `
            <div class="project-grid">
                <img src="${item.url}" class="project-img">
                <div class="project-info">
                    <span style="color:var(--red); font-weight:900;">PROJECT DETAIL</span>
                    <h1>${item.title}</h1>
                    <p style="line-height:1.8; color:var(--slate-600);">${item.description}</p>
                    <button class="btn-red" onclick="showHome()">← Back Home</button>
                </div>
            </div>
        `;
        window.scrollTo(0,0);
    };

    // --- Data Sync ---
    window.changeLang = (l) => {
        currentLang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l));
        fetchData();
    };

    function fetchData() {
        // About Text
        onSnapshot(doc(db, "content", `about_${currentLang}`), d => {
            document.getElementById('about-text').innerText = d.exists() ? d.data().text : "...";
        });

        // Gallery & Projects
        if(unsubGallery) unsubGallery();
        unsubGallery = onSnapshot(query(collection(db, `gallery_${currentLang}`), orderBy("timestamp", "desc")), snap => {
            const gList = document.getElementById('gallery-list');
            const hTrack = document.getElementById('hero-track');
            const navDropdown = document.getElementById('nav-projects');
            
            gList.innerHTML = ''; hTrack.innerHTML = ''; navDropdown.innerHTML = '';

            snap.forEach((doc, i) => {
                const item = doc.data();
                const id = doc.id;

                // Add to Nav Dropdown
                navDropdown.innerHTML += `<a onclick="showProject('${id}')">${item.title}</a>`;

                // Add to Hero
                if(item.isHero) {
                    hTrack.innerHTML += `<div class="slide" style="background-image:url('${item.url}')"></div>`;
                }

                // Add to Gallery Grid
                const rev = i % 2 !== 0 ? 'reverse' : '';
                gList.innerHTML += `
                    <div class="gallery-block ${rev}">
                        <img src="${item.url}" onclick="showProject('${id}')">
                        <div style="flex:1">
                            <h3>${item.title}</h3>
                            <p>${item.description.substring(0, 100)}...</p>
                            <button class="btn-red" onclick="showProject('${id}')" style="padding:10px 15px; font-size:0.7rem;">VIEW DETAILS</button>
                        </div>
                    </div>`;
            });
            hTrack.style.width = (snap.size * 100) + "%";
        });
    }

    // --- Contact Form ---
    document.getElementById('contactForm').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "inquiries"), {
            name: document.getElementById('cName').value,
            email: document.getElementById('cEmail').value,
            message: document.getElementById('cMsg').value,
            lang: currentLang,
            timestamp: serverTimestamp()
        });
        alert("Sent!");
        e.target.reset();
    };

    fetchData();
</script>
</body>
</html>
