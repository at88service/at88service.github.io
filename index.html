<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 Service | Excellence Redefined</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="nav-inner">
            <div class="logo-88">88</div>
            <div class="nav-links">
                <a href="#about">About</a>
                <a href="#gallery">Gallery</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </nav>

    <header class="hero-slider">
        <div class="slider-track">
            <div class="slide" style="background-image: url('images/slide1.jpg')">
                <div class="slide-overlay"><div class="hero-text"><h1>PRECISION</h1></div></div>
            </div>
            <div class="slide" style="background-image: url('images/slide2.jpg')">
                <div class="slide-overlay"><div class="hero-text"><h1>EXECUTION</h1></div></div>
            </div>
            <div class="slide" style="background-image: url('images/slide3.jpg')">
                <div class="slide-overlay"><div class="hero-text"><h1>88 QUALITY</h1></div></div>
            </div>
        </div>
    </header>

    <section id="about" class="section-padding">
        <div class="about-grid">
            <div>
                <span class="section-tag">Brand Story</span>
                <h2 style="font-size: 3.5rem; margin: 1rem 0;">The 88 Standard</h2>
                <p id="about-text" class="about-text">Loading information...</p>
            </div>
            <div class="gallery-img-wrapper" style="height: 400px;">
                <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800">
            </div>
        </div>
    </section>

    <section id="gallery" style="background: #f1f5f9; width: 100%;">
        <div class="section-padding">
            <h2 style="text-align: center; font-size: 3rem; margin-bottom: 4rem;">Portfolio <span style="color:var(--blue)">Excellence</span></h2>
            <div id="gallery-list"></div>
        </div>
    </section>

    <section id="contact" class="section-padding">
        <div class="contact-card">
            <h2 style="text-align: center; font-size: 3rem; margin-bottom: 3rem;">Start a <span style="color:var(--red)">Project</span></h2>
            <form id="contactForm" class="contact-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <input type="text" id="cName" placeholder="Name" class="form-input" required>
                    <input type="email" id="cEmail" placeholder="Email" class="form-input" required>
                </div>
                <textarea id="cMsg" rows="5" placeholder="Tell us about your project..." class="form-input" required></textarea>
                <button type="submit" class="btn-red">SEND INQUIRY</button>
            </form>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG (Replace with your actual keys from the previous step)
        const firebaseConfig = {
            apiKey: "AIzaSyAEvwmPsMFa1T6iSxvg6zFoZBd_R55rCQ8",
            authDomain: "service-6327f.firebaseapp.com",
            projectId: "service-6327f",
            storageBucket: "service-6327f.firebasestorage.app",
            messagingSenderId: "331161362655",
            appId: "1:331161362655:web:aa7cfbb45f83c1c8de096a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "content", "about"), (d) => {
            if(d.exists()) document.getElementById('about-text').innerText = d.data().text;
        });

        const q = query(collection(db, "gallery"), orderBy("timestamp", "desc"));
        onSnapshot(q, snap => {
            const list = document.getElementById('gallery-list');
            list.innerHTML = '';
            snap.docs.forEach((d, i) => {
                const item = d.data();
                const rev = i % 2 !== 0 ? 'reverse' : '';
                list.innerHTML += `
                    <div class="gallery-block ${rev}">
                        <div class="gallery-img-wrapper"><img src="${item.url}"></div>
                        <div class="gallery-content">
                            <h3>${item.title}</h3>
                            <p style="font-size: 1.2rem; color: var(--slate-600);">${item.description}</p>
                        </div>
                    </div>`;
            });
        });

        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "inquiries"), {
                name: document.getElementById('cName').value,
                email: document.getElementById('cEmail').value,
                message: document.getElementById('cMsg').value,
                timestamp: serverTimestamp()
            });
            alert("Message Sent!");
            e.target.reset();
        };
    </script>
</body>
</html>
